<!-- Display work -->
<div *ngIf="workDisplay">
    <h3>—□✕</h3>
    
    <h1 class = "name">{{ workDisplay.name }}</h1>
    <h2>{{ workDisplay.date }}</h2>
    <p>{{ workDisplay.blurb }}</p>
    <span [ngSwitch]='workDisplay.img'>
        <img *ngSwitchCase="null" (click) = "infoDisplay()" [src] = "'https://returntofreedom.org/store/wp-content/uploads/default-placeholder.png'" width = 300 height = 300>
        <img *ngSwitchDefault (click) = "infoDisplay()" [src] = "workDisplay.img" width = 300 height = 300>
    </span>
    
    <br>
    <a [routerLink]="['/works',workDisplay.id]" routerLinkActive="active">More Details</a>
    <br>

</div>
